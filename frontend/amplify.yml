version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - |
          printenv | grep -E '^(NEXT_PUBLIC_)' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
