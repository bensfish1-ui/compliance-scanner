version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix frontend
        - printenv | grep -E '^(NEXT_PUBLIC_)' > frontend/.env.production
    build:
      commands:
        - npm run build --prefix frontend
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*
