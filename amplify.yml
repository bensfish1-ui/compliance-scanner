version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend && npm ci
        - cd frontend && printenv | grep -E '^(NEXT_PUBLIC_)' > .env.production
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*
